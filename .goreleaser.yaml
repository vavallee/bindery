version: 2

project_name: bindery

before:
  hooks:
    - go mod download
    - npm ci --prefix web
    - npm run build --prefix web
    # vite writes to web/dist/, but the go:embed directive in
    # internal/webui/embed.go reads internal/webui/dist/. The Makefile and
    # Dockerfile both do this copy explicitly — goreleaser needs it too or
    # every cross-built binary embeds only the checked-in .gitkeep stub.
    - sh -c 'rm -rf internal/webui/dist && cp -r web/dist internal/webui/dist'

builds:
  - id: bindery
    main: ./cmd/bindery
    binary: bindery
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .FullCommit }}
      - -X main.date={{ .CommitDate }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "6"
      - "7"
    ignore:
      - goos: darwin
        goarch: arm
      - goos: windows
        goarch: arm

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

# Syft SBOMs (SPDX) accompany every archive. Published alongside the release
# artifacts and verifiable with `syft`/`grype`. Syft must be on $PATH in CI —
# the security.yml workflow installs it globally for the container-scan job;
# the release workflow installs it before invoking goreleaser.
sboms:
  - id: archive
    artifacts: archive
    documents:
      - "${artifact}.sbom.spdx.json"
    cmd: syft
    args:
      - "$artifact"
      - "--output"
      - "spdx-json=$document"

# The existing CI step creates the GitHub Release with CHANGELOG-derived notes
# before goreleaser runs; `mode: append` keeps those notes and just attaches
# the built archives + checksum file.
release:
  mode: append

# Release notes come from CHANGELOG.md via the existing workflow step, not from
# git log — disable goreleaser's own changelog generation so it doesn't overwrite.
changelog:
  disable: true

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"
