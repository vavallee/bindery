{{- if and .Values.ingress.enabled (eq (.Values.ingress.type | default "traefik") "traefik") }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "bindery.fullname" . }}-secure
  labels:
    {{- include "bindery.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: traefik-internal
spec:
  entryPoints:
    {{- toYaml .Values.ingress.entryPoints | nindent 4 }}
  routes:
    - kind: Rule
      match: Host(`{{ .Values.ingress.host }}`)
      services:
        - name: {{ include "bindery.fullname" . }}
          port: {{ .Values.service.port }}
  tls:
    certResolver: {{ .Values.ingress.certResolver }}
{{- end }}
