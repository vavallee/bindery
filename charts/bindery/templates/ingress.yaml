{{- if and .Values.ingress.enabled (eq (.Values.ingress.type | default "traefik") "standard") }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "bindery.fullname" . }}
  labels:
    {{- include "bindery.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "bindery.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
