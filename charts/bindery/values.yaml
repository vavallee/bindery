replicaCount: 1

image:
  repository: ghcr.io/vavallee/bindery
  tag: "sha-4eacca7"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8787

ingress:
  enabled: false
  host: bindery.example.com
  entryPoints:
    - internal-https
  certResolver: internal

persistence:
  config:
    enabled: true
    storageClass: longhorn
    size: 4Gi
    mountPath: /config

nfs:
  enabled: false
  server: ""
  path: /volume1/media
  mountPath: /media

env:
  BINDERY_PORT: "8787"
  BINDERY_DB_PATH: /config/bindery.db
  BINDERY_DATA_DIR: /config
  BINDERY_LOG_LEVEL: info
  BINDERY_DOWNLOAD_DIR: /downloads
  BINDERY_LIBRARY_DIR: /books
  # Separate destination for audiobook imports. Leave unset to fall back
  # to BINDERY_LIBRARY_DIR.
  # BINDERY_AUDIOBOOK_DIR: /audiobooks
  # Comma-separated from:to pairs rewriting paths reported by the download
  # client into paths bindery can see. Needed when SAB and bindery run in
  # separate pods with different mount points for the same storage.
  # BINDERY_DOWNLOAD_PATH_REMAP: /downloads/complete:/media/complete

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

strategy:
  type: Recreate

revisionHistoryLimit: 3
