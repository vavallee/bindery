replicaCount: 1

image:
  repository: ghcr.io/vavallee/bindery
  tag: "1.27.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8787

ingress:
  enabled: false
  # Which kind of ingress object to render:
  #   "traefik"  -> a Traefik IngressRoute CRD (traefik.io/v1alpha1). Requires
  #                 Traefik with the listed entryPoints/certResolver. This was the
  #                 only option historically and remains the default so existing
  #                 installs are unchanged.
  #   "standard" -> a portable networking.k8s.io/v1 Ingress, for nginx-ingress,
  #                 GKE/EKS, etc. Use className/annotations/tls below.
  type: traefik
  host: bindery.example.com
  # --- standard Ingress options (type: standard) ---
  className: ""
  annotations: {}
  # TLS blocks passed straight through to the Ingress spec, e.g.:
  # tls:
  #   - secretName: bindery-tls
  #     hosts: [bindery.example.com]
  tls: []
  # --- Traefik IngressRoute options (type: traefik) ---
  entryPoints:
    - internal-https
  certResolver: internal

persistence:
  config:
    enabled: true
    storageClass: longhorn
    size: 4Gi
    mountPath: /config

# Optional single NFS mount for media storage. For HARDLINK support (instant
# imports, no extra disk, torrents keep seeding) the download dir and the
# library dir must be subpaths of ONE mount on the same filesystem. Separate
# mounts get different device IDs inside the container, so hardlinks across
# them fail and Bindery falls back to copy. Recommended: mountPath: /data and
# point the BINDERY_*_DIR values below at subpaths of it (the TRaSH layout).
# See docs/DEPLOYMENT.md → "Storage layout and hardlinks (single mount)".
nfs:
  enabled: false
  server: ""
  path: /volume1/MEDIA
  mountPath: /media

env:
  BINDERY_PORT: "8787"
  BINDERY_DB_PATH: /config/bindery.db
  BINDERY_DATA_DIR: /config
  BINDERY_LOG_LEVEL: info
  # IMPORTANT: these defaults are placeholders, NOT a working layout — they are
  # two different paths and neither is backed by a mounted volume out of the
  # box. A dir that isn't inside a mounted volume writes to ephemeral container
  # storage and is lost on restart. Override them to subpaths of your real
  # mount. For hardlinks, download + library must share one mount, e.g.:
  #   nfs.mountPath: /data
  #   BINDERY_DOWNLOAD_DIR: /data/downloads/complete
  #   BINDERY_LIBRARY_DIR:  /data/books
  #   BINDERY_AUDIOBOOK_DIR: /data/audiobooks
  BINDERY_DOWNLOAD_DIR: /downloads
  BINDERY_LIBRARY_DIR: /books
  # Separate destination for audiobook imports. Leave unset to fall back
  # to BINDERY_LIBRARY_DIR.
  # BINDERY_AUDIOBOOK_DIR: /audiobooks
  # Comma-separated from:to pairs rewriting paths reported by the download
  # client into paths bindery can see. Only needed when the download client
  # and bindery run in separate pods with different mount points for the same
  # storage (e.g. with nfs.enabled). Leave unset for a single-pod install —
  # a stray remap silently rewrites paths the importer then can't find.
  # BINDERY_DOWNLOAD_PATH_REMAP: /downloads:/media
  # IP or CIDR of the reverse proxy in front of Bindery. When set, X-Forwarded-For
  # is trusted only from that address. Required for local-only auth mode to be safe.
  # BINDERY_TRUSTED_PROXY: "192.168.1.1"
  # Allow the UI to be embedded in an <iframe> by a trusted dashboard (Organizr,
  # etc.). Empty (default) blocks all framing. Set to a CSP frame-ancestors
  # source list: 'self' for same-origin, or a specific origin. See #1367.
  # BINDERY_FRAME_ANCESTORS: "https://organizr.example.com"

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

strategy:
  type: Recreate

revisionHistoryLimit: 3

serviceAccount:
  # If true, chart creates a dedicated SA with token automount disabled.
  # If false, the pod falls back to the namespace default SA.
  create: true
  # Override the generated SA name. Defaults to the chart fullname.
  name: ""

auth:
  # If set, the chart does NOT render a Secret — it references this
  # externally-managed one via envFrom/secretKeyRef. Preferred for GitOps
  # setups where the key is injected by sealed-secrets or SOPS.
  existingSecret: ""
  # Key inside the Secret that holds BINDERY_API_KEY. Matches the default
  # the chart-managed Secret emits (see templates/secret.yaml).
  apiKeySecretKey: api-key
  # Only used when existingSecret is empty. Providing this value tells the
  # chart to render a managed Secret named "<fullname>-auth". Leaving both
  # existingSecret AND apiKey empty means Bindery generates its own key on
  # first boot (stored in the DB, rotatable from the UI).
  apiKey: ""

networkPolicy:
  # Opt-in: when enabled, the chart creates a NetworkPolicy that restricts
  # ingress to the given selector and egress to DNS + explicitly listed
  # peers. Leave disabled unless your cluster has a NetworkPolicy-capable
  # CNI (Calico, Cilium, etc).
  enabled: false
  # Label selector(s) allowed to reach the Bindery pod on its service port.
  # Example: { matchLabels: { app.kubernetes.io/part-of: media-stack } }
  ingressSelector: {}
  # Additional egress rules beyond DNS. One entry per downstream service —
  # SABnzbd, qBittorrent, Prowlarr, notification target, etc.
  egress: []
  # Example entry — uncomment and adjust to allow egress to a named pod.
  # egress:
  #   - to:
  #       - podSelector:
  #           matchLabels:
  #             app.kubernetes.io/name: sabnzbd
  #     ports:
  #       - protocol: TCP
  #         port: 8080

hooks:
  postsyncSmoke:
    # ArgoCD PostSync Job that probes /api/v1/health and fails the sync if
    # the endpoint doesn't return 200 within 10 seconds. Harmless outside
    # of ArgoCD (it's a one-shot Job that runs and exits).
    enabled: true
    # Image used by the smoke-test container. Kept intentionally minimal
    # (busybox gives us wget + sh). Pin a digest in strict environments.
    image: busybox:1.37

logAlert:
  # Opt-in CronJob that polls GET /api/v1/system/logs (X-Api-Key auth) and
  # posts a short Discord message when the number of WARN/ERROR entries in
  # the lookback window crosses the thresholds below. Catches persistent
  # warnings that would otherwise sit unseen in the logs.
  enabled: false
  # Kubernetes five-field cron schedule. Default: top of every hour.
  schedule: "0 * * * *"
  # How far back to count, in minutes. Keep >= the schedule interval so
  # consecutive runs don't leave gaps (the API caps a single fetch at 1000
  # entries, so counts saturate there).
  lookbackMinutes: 60
  # Alert when ERROR entries in the window >= this value. 0 disables the
  # ERROR check.
  errorThreshold: 1
  # Alert when WARN entries in the window >= this value. 0 disables the
  # WARN check.
  warnThreshold: 20
  # Secret holding the Bindery API key (sent as the X-Api-Key header).
  # Point this at the same Secret the auth block uses (auth.existingSecret
  # or the chart-managed "bindery-auth"); key defaults to match.
  apiKeySecret:
    name: ""
    key: api-key
  # Secret holding the full Discord webhook URL.
  webhookSecret:
    name: ""
    key: url
  # Image for the alert script — needs sh + curl + jq. alpine/k8s ships all
  # three and is actively maintained. Pin a digest in strict environments.
  image: alpine/k8s:1.33.12
