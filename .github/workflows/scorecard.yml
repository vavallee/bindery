name: OpenSSF Scorecard

# Separate workflow: Scorecard requires its own minimal permissions and
# a separate schedule (one hour after security.yml to avoid rate-limit
# contention on the GitHub API).
#
# See: https://github.com/ossf/scorecard-action#permissions
on:
  schedule:
    # Weekly Monday 07:00 UTC — one hour after security.yml (06:00)
    - cron: '0 7 * * 1'
  push:
    branches: [main]

# Top-level permissions must be read-only — the Scorecard publish API
# rejects results from workflows that declare any global write permission.
permissions:
  actions: read
  contents: read

jobs:
  scorecard:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write  # upload SARIF to the Security tab
      id-token: write         # Sigstore OIDC signing for publish_results
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard.sarif
          results_format: sarif
          # Publish results to scorecard.dev public dashboard
          publish_results: true

      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: scorecard.sarif
          category: ossf-scorecard
