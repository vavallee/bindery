name: OpenSSF Scorecard

# Separate workflow: Scorecard requires its own minimal permissions and
# a separate schedule (one hour after security.yml to avoid rate-limit
# contention on the GitHub API).
#
# See: https://github.com/ossf/scorecard-action#permissions
on:
  schedule:
    # Weekly Monday 07:00 UTC — one hour after security.yml (06:00)
    - cron: '0 7 * * 1'
  push:
    branches: [main]

# Top-level permissions must be read-only — the Scorecard publish API
# rejects results from workflows that declare any global write permission.
permissions:
  actions: read
  contents: read

jobs:
  scorecard:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write  # upload SARIF to the Security tab
      id-token: write         # Sigstore OIDC signing for publish_results
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@ff5dd8929f96a8a4dc67d13f32b8c75057829621 # v2.4.0
        with:
          results_file: scorecard.sarif
          results_format: sarif
          # Publish results to scorecard.dev public dashboard
          publish_results: true

      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: always()
        with:
          sarif_file: scorecard.sarif
          category: ossf-scorecard
