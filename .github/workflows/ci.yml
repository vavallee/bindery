name: CI

on:
  push:
    branches: [main, development]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  # ── Parallel checks — all events ───────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.9"
          cache: true
      - uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: v2.11.4
          args: --timeout=5m
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --prefix web
      - run: npm run lint --prefix web
      - run: npm run typecheck --prefix web

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.9"
          cache: true
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: make smoke

  # PR-only: validates tests + frontend build (with race detector for correctness)
  validate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.9"
          cache: true
      - run: go test -race -coverprofile=coverage.out -covermode=atomic ./cmd/... ./internal/...
      - uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: coverage.out
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --prefix web
      - run: npm run build --prefix web

  # ── Gate: fast tests that must pass before image + release ─────────────────
  test:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.9"
          cache: true
      - run: go test -coverprofile=coverage.out -covermode=atomic ./cmd/... ./internal/...
      - uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: coverage.out
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --prefix web
      - run: npm run build --prefix web

  # Race-detector run — parallel with image/goreleaser, not a deploy gate.
  # A failure shows as a non-blocking check; fix before the next release.
  race:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.9"
          cache: true
      - run: go test -race ./cmd/... ./internal/...

  # ── Docker image — runs after test passes, parallel with goreleaser ─────────
  image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=development,enable=${{ github.ref == 'refs/heads/development' }}
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
      - name: Derive version
        id: ver
        run: |
          short="${GITHUB_SHA::7}"
          if described=$(git describe --tags --match 'v*' --always 2>/dev/null) && [[ "$described" == v* ]]; then
            echo "version=${described}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/heads/development ]]; then
            echo "version=dev-${short}" >> "$GITHUB_OUTPUT"
          else
            echo "version=sha-${short}" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        id: push
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Attest build provenance
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      # On tag push: update values-dev.yaml on the development branch so the
      # bindery-dev ArgoCD app picks up the new image. Production promotion is
      # done separately via the promote workflow (Actions → Promote to production)
      # after you've validated the dev deployment.
      - name: Deploy to dev (update values-dev.yaml on development branch)
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGE_TAG="${GITHUB_REF_NAME#v}"
          FILE_PATH="charts/bindery/values-dev.yaml"
          FILE_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/contents/${FILE_PATH}?ref=development" --jq .sha 2>/dev/null || echo "")
          CONTENT=$(printf 'image:\n  tag: "%s"\n' "${IMAGE_TAG}" | base64 -w0)
          if [ -n "$FILE_SHA" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/contents/${FILE_PATH}" \
              -X PUT \
              -f message="chore(deploy-dev): update to ${IMAGE_TAG} [skip ci]" \
              -f content="${CONTENT}" \
              -f sha="${FILE_SHA}" \
              -f branch="development"
          else
            gh api "repos/${GITHUB_REPOSITORY}/contents/${FILE_PATH}" \
              -X PUT \
              -f message="chore(deploy-dev): create values-dev.yaml for ${IMAGE_TAG} [skip ci]" \
              -f content="${CONTENT}" \
              -f branch="development"
          fi
          echo "Dev image tag updated to ${IMAGE_TAG} on development branch"
      - name: Trigger Argo CD dev refresh
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
        run: |
          if [ -z "${ARGOCD_SERVER:-}" ] || [ -z "${ARGOCD_TOKEN:-}" ]; then
            echo "::warning::ARGOCD_SERVER or ARGOCD_TOKEN not configured — Argo will pick up changes on next poll"
            exit 0
          fi
          curl -sf -X POST \
            -H "Authorization: Bearer ${ARGOCD_TOKEN}" \
            "${ARGOCD_SERVER}/api/v1/applications/bindery-dev?refresh=hard" \
            && echo "Argo CD dev refresh triggered" \
            || echo "::warning::Argo CD dev refresh trigger failed — Argo will pick up changes on next poll"

  # ── GoReleaser — runs after test passes, parallel with image, tags only ─────
  goreleaser:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.9"
          cache: true
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --prefix web
      - run: npm run build --prefix web
      - name: Populate embedded frontend
        run: rm -rf internal/webui/dist && cp -r web/dist internal/webui/dist && touch internal/webui/dist/.gitkeep
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          NOTES=$(awk -v ver="## [${VERSION}]" '
            index($0, ver) == 1           { found=1; next }
            found && index($0, "## ") == 1 { exit }
            found                         { print }
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            echo "::error::No CHANGELOG section found for ${VERSION}. Add '## [${VERSION}]' to CHANGELOG.md before tagging."
            exit 1
          fi

          TITLE=$(printf '%s' "$NOTES" | awk 'NF { print; exit }' | sed 's/^### //')
          RELEASE_TITLE="${VERSION} — ${TITLE}"

          if gh release view "$VERSION" &>/dev/null; then
            echo "Release $VERSION already exists — updating notes."
            printf '%s' "$NOTES" | gh release edit "$VERSION" --title "$RELEASE_TITLE" --notes-file -
          else
            printf '%s' "$NOTES" | gh release create "$VERSION" --title "$RELEASE_TITLE" --notes-file -
          fi
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
      - name: GoReleaser (release binaries)
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Pre-deploy smoke — hits dev after image deploys ────────────────────────
  # Update BINDERY_DEV_URL below (or add a BINDERY_DEV_URL secret) once you
  # have a dev/staging instance URL distinct from production.
  predeploy-smoke:
    name: Pre-deploy smoke
    needs: image
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.9"
          cache: true
      - name: Wait for ArgoCD dev to sync
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
        run: |
          if [[ -z "$ARGOCD_SERVER" || -z "$ARGOCD_TOKEN" ]]; then
            echo "ArgoCD secrets not set — skipping wait"
            exit 0
          fi
          echo "Waiting for ArgoCD app 'bindery-dev' to be Healthy+Synced..."
          for i in $(seq 1 24); do
            STATUS=$(curl -sf -H "Authorization: Bearer $ARGOCD_TOKEN" \
              "$ARGOCD_SERVER/api/v1/applications/bindery-dev" | \
              python3 -c "import json,sys; d=json.load(sys.stdin); print(d['status']['health']['status'], d['status']['sync']['status'])" 2>/dev/null || echo "unknown unknown")
            echo "  attempt $i: $STATUS"
            [[ "$STATUS" == "Healthy Synced" ]] && echo "ArgoCD dev sync complete" && exit 0
            sleep 10
          done
          echo "Timed out waiting for ArgoCD dev sync"
          exit 1
      - name: Run pre-deploy smoke tests
        env:
          BINDERY_URL: https://bindery.autonomy.ninja
          BINDERY_API_KEY: ${{ secrets.BINDERY_SMOKE_API_KEY }}
        run: |
          if ! curl -sf --max-time 5 "$BINDERY_URL/api/v1/health" > /dev/null 2>&1; then
            echo "::warning::Live instance unreachable from runner — skipping pre-deploy smoke"
            exit 0
          fi
          make predeploy-smoke
