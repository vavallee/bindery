name: CI

on:
  push:
    branches: [main, development]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  # Single job: test + build + push + deploy
  # Eliminates inter-job wait times and redundant checkouts
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # git push Helm chart image tag
      packages: write      # docker push to ghcr.io
      id-token: write      # SLSA attestation OIDC token
      attestations: write  # actions/attest-build-provenance
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # goreleaser needs full history + tags

      # Go setup + test
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.9"
      - run: go test -race -coverprofile=coverage.out -covermode=atomic ./cmd/... ./internal/...
      - uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: coverage.out
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      # Node setup + build (validates lint + typecheck + build in one step)
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --prefix web
      - run: npm run build --prefix web

      # Docker build + push (amd64 only for speed)
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=development,enable=${{ github.ref == 'refs/heads/development' }}
            type=semver,pattern={{version}}
      # Derive the in-binary VERSION string shown in the UI.
      # Uses git describe so any commit on main that descends from a vX.Y.Z
      # tag shows that tag (or "vX.Y.Z-N-gSHA" when N commits ahead).
      # This means Argo CD deployments of post-release main commits still
      # display a recognisable version rather than a raw SHA.
      #   exactly on tag  → "v0.9.0"
      #   N commits ahead → "v0.9.0-N-gabcdef1"
      #   development     → "dev-abcdef1"
      #   no v* tags yet  → "sha-abcdef1"
      - name: Derive version
        id: ver
        run: |
          short="${GITHUB_SHA::7}"
          if described=$(git describe --tags --match 'v*' --always 2>/dev/null) && [[ "$described" == v* ]]; then
            echo "version=${described}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/heads/development ]]; then
            echo "version=dev-${short}" >> "$GITHUB_OUTPUT"
          else
            echo "version=sha-${short}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        id: push
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # SLSA build provenance — cryptographically binds the image digest we
      # just pushed to this workflow run. Consumers verify with:
      #   gh attestation verify oci://ghcr.io/vavallee/bindery@<digest> \
      #     --repo vavallee/bindery
      # See docs/security for the full verification recipe.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      # Deploy: bump Helm chart image tag on main and development branches.
      # ArgoCD can track either branch — switch targetRevision to flip
      # between prod (main) and dev (development).
      - name: Update Helm image tag
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development'
        run: |
          IMAGE_TAG="sha-${GITHUB_SHA::7}"
          sed -i "s|tag:.*|tag: \"${IMAGE_TAG}\"|" charts/bindery/values.yaml
      - name: Commit and push
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development'
        run: |
          git config user.name "vavallee"
          git config user.email "75899046+vavallee@users.noreply.github.com"
          git add charts/bindery/values.yaml
          git diff --staged --quiet || git commit -m "chore(deploy): update bindery image to sha-${GITHUB_SHA::7} [skip ci]"
          git push || true  # best-effort: branch protection may reject on development

      # Create GitHub Release on tag push using the matching CHANGELOG section.
      # Idempotent: updates notes if a release for the tag already exists.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          NOTES=$(awk -v ver="## [${VERSION}]" '
            index($0, ver) == 1           { found=1; next }
            found && index($0, "## ") == 1 { exit }
            found                         { print }
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            echo "ERROR: No CHANGELOG section found for ${VERSION}. Aborting release."
            exit 1
          fi

          TITLE=$(printf '%s' "$NOTES" | awk 'NF { print; exit }' | sed 's/^### //')
          RELEASE_TITLE="${VERSION} — ${TITLE}"

          if gh release view "$VERSION" &>/dev/null; then
            echo "Release $VERSION already exists — updating notes."
            printf '%s' "$NOTES" | gh release edit "$VERSION" --title "$RELEASE_TITLE" --notes-file -
          else
            printf '%s' "$NOTES" | gh release create "$VERSION" --title "$RELEASE_TITLE" --notes-file -
          fi

      # Syft must be on $PATH before goreleaser runs because .goreleaser.yaml
      # calls out to it for the sboms: block. Anchore's action installs the
      # latest release into /usr/local/bin.
      - name: Install Syft
        if: startsWith(github.ref, 'refs/tags/v')
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

      # Cross-compile release binaries and attach them to the GitHub Release
      # created above. Runs only on tag push; `release.mode: append` in
      # .goreleaser.yaml keeps the CHANGELOG-derived notes intact.
      - name: GoReleaser (release binaries)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Lint + security — runs in parallel with build
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.9"
      - uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: v2.11.4
          args: --timeout=5m
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --prefix web
      - run: npm run lint --prefix web
      - run: npm run typecheck --prefix web

  # PR validation only — no Docker build
  validate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.9"
      - run: go test -race -coverprofile=coverage.out -covermode=atomic ./cmd/... ./internal/...
      - uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: coverage.out
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --prefix web
      - run: npm run build --prefix web

  # Post-deploy smoke test: boot the real binary against a scratch data dir
  # and hit the golden-path endpoints. Catches wiring regressions (bad route
  # registration, missing migration, broken frontend embed) that unit tests
  # can't see. Runs on PRs and main/development pushes.
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.9"
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: make smoke
