---
apiVersion: v1
kind: Namespace
metadata:
  name: bindery-ping
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bindery-ping
  namespace: bindery-ping
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bindery-ping
  namespace: bindery-ping
  labels:
    app: bindery-ping
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bindery-ping
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: bindery-ping
    spec:
      serviceAccountName: bindery-ping
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ping
          # Carries the latest-release poller (#1289): on boot it seeds
          # LATEST_VERSION below, then keeps `latest` in sync with the newest
          # GitHub release every 30m. Deploys here are manual (the cluster is
          # unreachable from CI runners), so bump this sha when rolling a new
          # telemetry-server build.
          image: ghcr.io/vavallee/bindery-ping:sha-23586cd355e40700e2b60e8d9344ba4e2afd3cb3
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: DB_PATH
              value: /data/telemetry.db
            # Boot-time fallback only; the poller (#1289) overrides this from the
            # GitHub Releases API within a second of startup. Kept current so the
            # advertised version is sane even if GitHub is unreachable at boot.
            - name: LATEST_VERSION
              value: v1.22.2
            # Repo the poller queries for the newest release (defaults to this).
            - name: GITHUB_REPO
              value: vavallee/bindery
            - name: STATS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: bindery-ping-secret
                  key: stats-token
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: data
              mountPath: /data
            # Writable scratch. The container runs readOnlyRootFilesystem;
            # the server stages its /api/backup VACUUM INTO copy next to the
            # DB now, but keeping /tmp writable is cheap insurance for any
            # stdlib path that falls back to it.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: bindery-ping-data
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: bindery-ping
  namespace: bindery-ping
spec:
  selector:
    app: bindery-ping
  ports:
    - port: 8080
      targetPort: 8080
